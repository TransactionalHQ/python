name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: python -m build
      - run: ruff check .
      - run: mypy usetransactional/
      - run: pytest

