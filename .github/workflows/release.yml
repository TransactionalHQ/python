name: Release
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/**'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for [skip ci]
        id: skip
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -q '\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.skip.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        if: steps.skip.outputs.skip != 'true'
        run: pip install build twine

      - name: Bump version
        if: steps.skip.outputs.skip != 'true'
        id: version
        run: |
          CURRENT=$(python -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()).group(1))")
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW="${major}.${minor}.$((patch + 1))"
          sed -i "s/^version = \"${CURRENT}\"/version = \"${NEW}\"/" pyproject.toml
          sed -i "s/__version__ = \"${CURRENT}\"/__version__ = \"${NEW}\"/" usetransactional/__init__.py
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Build
        if: steps.skip.outputs.skip != 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.skip.outputs.skip != 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

      - name: Commit & Tag
        if: steps.skip.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml usetransactional/__init__.py
          git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags
